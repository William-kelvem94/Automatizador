# ===== REDIS CONFIGURATION FOR AUTOMATOR WEB IA v8.0 =====

# Network
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 300

# General
daemonize no
supervised no
loglevel notice
databases 16

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Security (basic for development)
# requirepass yourpasswordhere

# Performance
tcp-backlog 511
databases 16

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command SHUTDOWN SHUTDOWN_REDIS

# Logging
logfile ""

# Disable AOF for performance (RDB is sufficient)
appendonly yes
appendfsync everysec

# Disable snapshot on startup for faster boot
# save ""
