apiVersion: apps/v1
kind: Deployment
metadata:
  name: automator-webia
  namespace: automator-webia
  labels:
    app: automator-webia
    component: app
    version: "8.0.0"
spec:
  replicas: 3  # Auto-scaling via HPA
  selector:
    matchLabels:
      app: automator-webia
      component: app
  template:
    metadata:
      labels:
        app: automator-webia
        component: app
        version: "8.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: automator-app
        image: automator/webia:8.0.0
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: AUTOMATOR_ENV
          valueFrom:
            configMapKeyRef:
              name: automator-config
              key: AUTOMATOR_ENV
        - name: AUTOMATOR_VERSION
          valueFrom:
            configMapKeyRef:
              name: automator-config
              key: AUTOMATOR_VERSION
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-cluster:6379/0"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: redis-password
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: jwt-secret
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: encryption-key
        # AI Configuration
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: anthropic-api-key
        # Monitoring
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: automator-secrets
              key: sentry-dsn
        command: ["python", "smart_launcher.py", "--mode", "api", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
        - name: cache-volume
          mountPath: /app/cache
        - name: ssl-certs
          mountPath: /etc/ssl/certs
          readOnly: true

      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}
      - name: ssl-certs
        secret:
          secretName: automator-tls
          items:
          - key: tls.crt
            path: tls.crt

      # Affinity para distribuir pods
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - automator-webia
              topologyKey: kubernetes.io/hostname

      # Tolerations para nodes específicos
      tolerations:
      - key: "automator-webia"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

---
# Service para a aplicação principal
apiVersion: v1
kind: Service
metadata:
  name: automator-webia
  namespace: automator-webia
  labels:
    app: automator-webia
    component: app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: automator-webia
    component: app

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: automator-webia-hpa
  namespace: automator-webia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: automator-webia
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: automator_api_requests_total
      target:
        type: AverageValue
        averageValue: "100"  # 100 requests per pod
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# Vertical Pod Autoscaler (se disponível)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: automator-webia-vpa
  namespace: automator-webia
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: automator-webia
  updatePolicy:
    updateMode: "Auto"  # Ou "Off" para recomendações apenas
  resourcePolicy:
    containerPolicies:
    - containerName: automator-app
      minAllowed:
        cpu: 200m
        memory: 256Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledResources: ["cpu", "memory"]

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: automator-webia-pdb
  namespace: automator-webia
spec:
  minAvailable: 2  # Manter pelo menos 2 pods disponíveis
  selector:
    matchLabels:
      app: automator-webia
      component: app
