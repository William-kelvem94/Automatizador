apiVersion: v1
kind: Secret
metadata:
  name: automator-secrets
  namespace: automator-webia
  labels:
    app: automator-webia
    component: secrets
type: Opaque
data:
  # Senhas base64 encoded (serão preenchidas em produção)
  postgres-password: ""  # Base64 encoded
  redis-password: ""     # Base64 encoded
  jwt-secret: ""         # Base64 encoded
  encryption-key: ""     # Base64 encoded

  # API Keys
  openai-api-key: ""     # Base64 encoded
  anthropic-api-key: ""  # Base64 encoded
  sentry-dsn: ""         # Base64 encoded

  # Database connection
  database-url: ""       # Base64 encoded PostgreSQL URL

  # SMTP para alertas
  smtp-password: ""      # Base64 encoded

  # CDN credentials
  cdn-api-key: ""        # Base64 encoded
  cdn-zone-id: ""        # Base64 encoded

---
# Secret para TLS certificates
apiVersion: v1
kind: Secret
metadata:
  name: automator-tls
  namespace: automator-webia
  labels:
    app: automator-webia
    component: tls
type: kubernetes.io/tls
data:
  tls.crt: ""  # Base64 encoded certificate
  tls.key: ""  # Base64 encoded private key
