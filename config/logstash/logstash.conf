# Logstash Configuration for Automator Web IA v8.0
# Processa logs estruturados da aplicação

input {
  # Input HTTP para receber logs via API
  http {
    host => "0.0.0.0"
    port => 8080
    codec => json
    tags => ["automator", "api"]
  }

  # Input TCP para logs diretos da aplicação
  tcp {
    host => "0.0.0.0"
    port => 5000
    codec => json_lines
    tags => ["automator", "direct"]
  }

  # Input para arquivos de log
  file {
    path => "/app/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
    tags => ["automator", "file"]
  }

  # Input para métricas do Prometheus (se necessário)
  # prometheus {
  #   host => "prometheus"
  #   port => 9090
  #   tags => ["prometheus"]
  # }
}

filter {
  # Filtro para logs da aplicação
  if "automator" in [tags] {
    # Parse timestamp se necessário
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }

    # Parse nível de log
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \[%{WORD:log_level}\] %{DATA:logger_name}: %{GREEDYDATA:log_message}"
      }
      tag_on_failure => ["grok_parse_failure"]
    }

    # Adiciona campos padrão
    mutate {
      add_field => {
        "service" => "automator-webia"
        "version" => "8.0.0"
        "environment" => "%{[@metadata][environment]}"
      }
    }

    # Filtra logs de debug em produção
    if [environment] == "production" and [log_level] == "DEBUG" {
      drop {}
    }

    # Enriquecimento baseado no tipo de log
    if [logger_name] =~ "security" {
      mutate {
        add_tag => ["security"]
        add_field => {
          "category" => "security"
          "priority" => "high"
        }
      }
    }

    if [logger_name] =~ "api" {
      mutate {
        add_tag => ["api"]
        add_field => {
          "category" => "api"
          "response_time" => "%{[@metadata][response_time]}"
        }
      }
    }

    if [logger_name] =~ "task" {
      mutate {
        add_tag => ["task"]
        add_field => {
          "category" => "automation"
          "task_id" => "%{[@metadata][task_id]}"
          "task_type" => "%{[@metadata][task_type]}"
        }
      }
    }
  }

  # Filtro para métricas
  if "prometheus" in [tags] {
    mutate {
      add_field => {
        "service" => "prometheus"
        "category" => "metrics"
      }
    }
  }

  # Remove campos desnecessários
  mutate {
    remove_field => ["[@metadata]"]
  }
}

output {
  # Output principal para Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "automator-webia-%{+YYYY.MM.dd}"
    document_type => "_doc"

    # Configurações de retry
    retry_on_conflict => 3
    retry_on_failure => true

    # Template de index
    template => "/etc/logstash/templates/automator-template.json"
    template_name => "automator-webia"
    template_overwrite => true
  }

  # Output para console (debug)
  if [environment] != "production" {
    stdout {
      codec => rubydebug
    }
  }

  # Output para arquivo de backup
  file {
    path => "/var/log/logstash/automator-backup-%{+YYYY-MM-dd}.log"
    codec => json_lines
    gzip => true
  }

  # Output condicional para alertas de segurança
  if "security" in [tags] and [priority] == "high" {
    email {
      to => "security@automator.webia.com"
      subject => "🚨 Security Alert: %{message}"
      body => "Security incident detected:\n\n%{message}\n\nDetails: %{@metadata}"
      via => "smtp"
      options => {
        "smtpIporHost" => "smtp.automator.webia.com"
        "port" => 587
        "authentication" => "plain"
        "user" => "alerts@automator.webia.com"
        "password" => "${SMTP_PASSWORD}"
      }
    }
  }
}
