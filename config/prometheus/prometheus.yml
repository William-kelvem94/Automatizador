# Prometheus Configuration for Automator Web IA v8.0
# Configuração enterprise com alta disponibilidade e escalabilidade

global:
  scrape_interval: 15s        # Intervalo padrão de coleta
  scrape_timeout: 10s         # Timeout para coleta
  evaluation_interval: 15s    # Intervalo de avaliação de regras

  # Configurações externas (para produção)
  external_labels:
    environment: "${ENVIRONMENT:-production}"
    region: "${REGION:-us-east-1}"
    cluster: "automator-webia"

# Configurações de alertas
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
      timeout: 10s

# Carregar regras de alerta
rule_files:
  - "alert_rules.yml"

# Configurações de scrape
scrape_configs:

  # ===== APLICAÇÃO PRINCIPAL =====
  - job_name: 'automator-webia'
    static_configs:
      - targets: ['automator-webia:8000']
        labels:
          service: 'automator-webia'
          component: 'app'
          version: '8.0.0'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    honor_labels: true

    # Configurações de service discovery
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
        regex: '/(.+)'
        replacement: '$1'

    # Configurações de TLS (para produção)
    # tls_config:
    #   ca_file: /etc/prometheus/ssl/ca.crt
    #   cert_file: /etc/prometheus/ssl/client.crt
    #   key_file: /etc/prometheus/ssl/client.key
    #   insecure_skip_verify: false

  # ===== POSTGRESQL =====
  - job_name: 'automator-postgres'
    static_configs:
      - targets: ['postgres:9187']
        labels:
          service: 'postgres'
          component: 'database'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ===== REDIS =====
  - job_name: 'automator-redis'
    static_configs:
      - targets: ['redis:9121']
        labels:
          service: 'redis'
          component: 'cache'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ===== NODE EXPORTER (Sistema) =====
  - job_name: 'automator-nodes'
    static_configs:
      - targets:
        - 'automator-webia:9100'
        - 'postgres:9100'
        - 'redis:9100'
        - 'elasticsearch:9100'
        labels:
          service: 'node'
          component: 'system'
    scrape_interval: 30s

  # ===== ELASTICSEARCH =====
  - job_name: 'automator-elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9114']
        labels:
          service: 'elasticsearch'
          component: 'logging'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ===== LOGSTASH =====
  - job_name: 'automator-logstash'
    static_configs:
      - targets: ['logstash:9600']
        labels:
          service: 'logstash'
          component: 'logging'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ===== NGINX =====
  - job_name: 'automator-nginx'
    static_configs:
      - targets: ['nginx:9113']
        labels:
          service: 'nginx'
          component: 'proxy'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ===== CADVISOR (Containers) =====
  - job_name: 'automator-cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          component: 'monitoring'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ===== PROMETHEUS PRÓPRIO =====
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'
    scrape_interval: 30s

  # ===== GRAFANA =====
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3001']
        labels:
          service: 'grafana'
          component: 'visualization'
    scrape_interval: 60s
    metrics_path: '/metrics'

  # ===== ALERTMANAGER =====
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'
          component: 'alerting'
    scrape_interval: 60s

