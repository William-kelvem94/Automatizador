# EXEMPLO DE CONFIGURACAO
# Copie este arquivo para config.ini e personalize com suas informacoes

[SITE]
# URL da pagina de login
url = https://exemplo.com/login

# Seletor CSS do campo de email
# Exemplos: #email, input[name="email"], input[type="email"]
email_field_selector = input[type="email"]

# Seletor CSS do campo de senha
password_field_selector = input[type="password"]

# Seletor CSS do botao de login
# Exemplos: .btn-login, button[type="submit"], #login-button
login_button_selector = button[type="submit"]

[CREDENTIALS]
# Suas credenciais de login
email = seu_email@exemplo.com
password = sua_senha_aqui

[SCHEDULE]
# Horarios para executar o login (formato 24h: HH:MM)
# Separe multiplos horarios com virgula
# Exemplos: 08:00, 12:00, 18:00, 22:00
horarios = 08:00, 12:00, 18:00, 22:00

[SETTINGS]
# Executar navegador em modo headless (sem interface grafica)
headless = false

# Tempo de espera em segundos para elementos da pagina
wait_timeout = 10
