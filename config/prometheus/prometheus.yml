# ===== STORAGE =====
storage:
  tsdb:
    # Configurações de retenção
    retention:
      time: 30d     # 30 dias de retenção
      size: 100GB  # Máximo 100GB

    # Configurações de WAL
    wal_compression: true

    # Configurações de chunks
    max_block_chunk_segment_size: 512MB
    min_block_duration: 2h
    max_block_duration: 36h

# ===== LIMITES DE RECURSOS =====
limits:
  # Configurações de query
  max_samples: 50000000
  max_series: 1000000
  max_concurrent_queries: 20

  # Configurações de séries temporais
  max_series_per_query: 100000
  max_samples_per_query: 50000000

