[tool:pytest]
# Configurações do pytest para Automator Web IA v8.0

# Diretórios de teste
testpaths = tests

# Padrões de descoberta de testes
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Configurações de execução
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-report=term-missing
    --cov-fail-under=80
    --durations=10
    --maxfail=5

# Marcadores personalizados
markers =
    unit: Testes unitários (rápidos, isolados)
    integration: Testes de integração (mais lentos, dependem de componentes)
    e2e: Testes end-to-end (muito lentos, testam fluxo completo)
    performance: Testes de performance e benchmarking
    slow: Testes lentos (marcar para pular em CI rápido)
    enterprise: Testes específicos para funcionalidades enterprise
    security: Testes de segurança
    api: Testes da API REST
    gui: Testes da interface gráfica
    database: Testes de banco de dados
    ai: Testes de funcionalidades de IA
    async: Testes assíncronos

# Configurações de filtro
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:playwright.*
    ignore::ResourceWarning

# Configurações de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Configurações de asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Configurações de paralelização (usar com pytest-xdist)
# addopts = --numprocesses=auto (adicionar quando disponível)

# Configurações de cache
cache_dir = .pytest_cache

# Configurações de output
console_output_style = progress
junit_family = xunit2
junit_logging = all
